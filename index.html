<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerGlow | Wellness</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow-bg"></div>

<main class="app-container">
    <header class="header">
        <h1 class="logo">InnerGlow</h1>
        <p class="subtitle">Relax your mind, one tap at a time</p>
    </header>

    <section class="glass-card">
        <div class="interaction-area">
            <div id="bubble" class="pulse-element"></div>
            <p id="message">Tap to release stress 🌿</p>
        </div>

        <div class="stats-row">
            <div class="stat-pill">
                <span class="icon">✨</span>
                <span id="coins">0</span>
            </div>
        </div>

        <footer class="card-footer">
            <p class="hint">Breathe… you're safe here 💖</p>
        </footer>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
